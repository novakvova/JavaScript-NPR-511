<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Вивчення JavaScript</title>
</head>
<body>
<h1>Я люблю JavaScript</h1>

<script>
    //Оголошення змінних
    a = 25; // Змінна цілого типу a - містить 25
    document.writeln("<p>")
    document.writeln("a = " + 25);
    document.writeln("</p>")
    //ES5- це Ecma Script 5 - це стандарт JavaScript
    //Ще є ключове слова var - призначення аналогічне
    let b = 18; // У новому JavaScript додали слово let
    //для оголошення змінної
    document.writeln("<h3>");
    document.writeln("b = " + b);
    document.writeln("</h3>");
</script>

<script>
    // Буду писати цикл for
    // Працює так само як у C++
    const n = 10; // кількість ітерацій циклу
    document.writeln("<ol>");
    for(i =0; i < n; i++) {
        document.writeln("<li>");
        document.writeln("i = " + i);
        document.writeln("</li>");
    }
    document.writeln("</ol>");
</script>

</body>
</html>
