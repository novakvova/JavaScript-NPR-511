<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Робота з формами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
</head>
<body>
<main>
    <h1 class="text-center">Реєстрація користувача</h1>
    <div class="container">
        <form class="row g-3 col-md-8 offset-md-2 needs-validation" novalidate>
            <div class="col-md-6">
                <label for="lastName" class="form-label">Прізвище</label>
                <input type="text"
                       class="form-control"
                       id="lastName"
                       name="lastName"
                       placeholder="Прізвище" required>
                <div class="invalid-feedback">
                    Вкажіть прізвище.
                </div>
            </div>
            <div class="col-md-6">
                <label for="firstName" class="form-label">Ім'я</label>
                <input type="text"
                       class="form-control"
                       id="firstName"
                       name="firstName"
                       placeholder="Ім'я" required>
                <div class="invalid-feedback">
                    Вкажіть ім'я.
                </div>
            </div>

            <div class="col-md-6">
                <label for="email" class="form-label">Електронна пошта</label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       placeholder="Електронна пошта" required>
                <div class="invalid-feedback">
                    Вкажіть пошту.
                </div>
            </div>

            <div class="col-md-6">
                <label for="password" class="form-label">Пароль</label>
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="Пароль" required>
                <div class="invalid-feedback">
                    Вкажіть пароль.
                </div>
            </div>

            <div>
                <label class="col-md-12" for="file">
                    <img src="/images/avatar.png"
                         id="avatarView"
                         class="mx-auto d-block"
                         role="button"
                         style="width: 250px; border-radius: 50%;"
                         alt="Фото користувача">
                    <span role="button"
                          class="mx-auto d-block text-center fs-5 text-success"
                          style="width: 200px">
                        Натисніть для вибору фото
                    </span>
                </label>
                <input type="file"
                       id="file"
                       name="file"
                       class="d-none"
                       accept="image/*"/>
            </div>

            <div class="col-12">
                <button class="btn btn-primary" type="submit">Реєстрація користувача</button>
            </div>
        </form>
    </div>

    <!-- Button trigger modal -->
<!--    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">-->
<!--        Launch demo modal-->
<!--    </button>-->

    <!-- Modal -->
    <div class="modal" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Редагування фото</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <img src="/images/avatar.png"
                         id="imgCrop"
                         class="mx-auto d-block"
                         role="button"
                         style="width: 250px;"
                         alt="Фото користувача">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                    <button type="button" class="btn btn-primary" id="btnSaveImage">Зберегти фото</button>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.18.0/dist/axios.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js"></script>
